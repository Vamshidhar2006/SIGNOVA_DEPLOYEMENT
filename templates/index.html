<!DOCTYPE html>
<html>

<head>
<title>SIGNOVA</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
body{margin:0;background:#0a0f1a;color:#e5e7eb;font-family:Segoe UI,sans-serif;}
#landing{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;}
#landing h1{font-size:42px;color:#22d3ee;margin-bottom:20px;}
.enter-btn{width:260px;padding:16px;border:none;background:#22d3ee;color:black;cursor:pointer;}
#dashboard{display:none;height:100vh;}
.container{display:flex;height:100%;}
.left{flex:2;display:flex;justify-content:center;align-items:center;background:#020617;}
canvas{border:2px solid #22d3ee;border-radius:8px;}
.right{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:20px;background:#020617;}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.lang-grid button{padding:14px;border:none;background:#111827;color:white;cursor:pointer;}
.voice-toggle{display:flex;justify-content:space-between;padding:12px;background:#111827;}
.output-box{padding:18px;border:1px solid #1f2937;margin-top:10px;}
.output-text{font-size:20px;color:#22d3ee;}
.bottom button{width:100%;padding:16px;background:#22d3ee;color:black;cursor:pointer;}
</style>
</head>

<body>

<div id="landing">
<h1>SIGNOVA</h1>
<button class="enter-btn" onclick="openDashboard()">Enter</button>
</div>

<div id="dashboard">
<div class="container">

<div class="left">
<video id="video" style="display:none"></video>
<canvas id="canvas"></canvas>
</div>

<div class="right">

<div class="lang-grid">
<button onclick="setLanguage('hi')">Hindi</button>
<button onclick="setLanguage('te')">Telugu</button>
<button onclick="setLanguage('kn')">Kannada</button>
<button onclick="setLanguage('ta')">Tamil</button>
</div>

<div class="voice-toggle">
<span>Voice Output</span>
<button onclick="toggleVoice()" id="voiceBtn">ON</button>
</div>

<div class="output-box">
<h4>English</h4>
<div id="prediction" class="output-text">Waiting...</div>
</div>

<div class="output-box">
<h4>Translation</h4>
<div id="translation" class="output-text">---</div>
</div>

<div class="bottom">
<button onclick="startCamera()">Start Camera</button>
</div>

</div>
</div>
</div>

<script>

let sequence=[]
let selectedLanguage="en"
let lastTime=0
let voiceEnabled=true
let lastPrediction=""

function openDashboard(){
document.getElementById("landing").style.display="none"
document.getElementById("dashboard").style.display="block"
}

function setLanguage(lang){selectedLanguage=lang}

function toggleVoice(){
voiceEnabled=!voiceEnabled
document.getElementById("voiceBtn").innerText = voiceEnabled ? "ON" : "OFF"
}

function speak(text){
if(!voiceEnabled) return
speechSynthesis.cancel()
let speech=new SpeechSynthesisUtterance(text)
speech.rate=0.9
speechSynthesis.speak(speech)
}

function extract(r){
let p=new Array(99).fill(0)
let lh=new Array(63).fill(0)
let rh=new Array(63).fill(0)

if(r.poseLandmarks){
for(let i=0;i<33;i++){
p[i*3]=r.poseLandmarks[i].x
p[i*3+1]=r.poseLandmarks[i].y
p[i*3+2]=r.poseLandmarks[i].z}}

if(r.leftHandLandmarks){
for(let i=0;i<21;i++){
lh[i*3]=r.leftHandLandmarks[i].x
lh[i*3+1]=r.leftHandLandmarks[i].y
lh[i*3+2]=r.leftHandLandmarks[i].z}}

if(r.rightHandLandmarks){
for(let i=0;i<21;i++){
rh[i*3]=r.rightHandLandmarks[i].x
rh[i*3+1]=r.rightHandLandmarks[i].y
rh[i*3+2]=r.rightHandLandmarks[i].z}}

return [...p,...lh,...rh]
}

function startCamera(){

const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

/* 🔥 LOWER RESOLUTION */
canvas.width=320
canvas.height=240

const holistic=new Holistic({
locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}`
})

/* 🔥 LIGHTER MODEL */
holistic.setOptions({
modelComplexity:0,
minDetectionConfidence:0.6,
minTrackingConfidence:0.7
})

holistic.onResults(async r=>{

ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.drawImage(r.image,0,0,canvas.width,canvas.height)

let kp=extract(r)
sequence.push(kp)
if(sequence.length>30) sequence.shift()

let now=Date.now()

/* 🔥 CONTROL REQUEST RATE */
if(sequence.length>=25 && now-lastTime>2200){

const res=await fetch("/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
keypoints:sequence.slice(-20),
language:selectedLanguage
})
})

const data=await res.json()

if(data.english && data.english!==lastPrediction){

lastPrediction=data.english
lastTime=now

document.getElementById("prediction").innerText=data.english
document.getElementById("translation").innerText=data.result

speak(data.english)
}
}
})

const camera=new Camera(video,{
onFrame:async()=>{await holistic.send({image:video})},
width:320,
height:240
})

camera.start()
}

</script>

</body>
</html>
